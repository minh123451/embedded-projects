# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-gpio_driver"
BBFILE_PATTERN_meta-gpio_driver = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-gpio_driver = "6"

LAYERDEPENDS_meta-gpio_driver = "core"
LAYERSERIES_COMPAT_meta-gpio_driver = "dunfell"
