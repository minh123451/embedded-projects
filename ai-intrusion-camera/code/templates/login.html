<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE EYE | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-color);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            border-color: var(--primary-color);
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:active {
            transform: scale(0.98);
        }
        .error-msg {
            color: var(--danger-color);
            background: rgba(255, 77, 77, 0.1);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 77, 77, 0.3);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <h1 class="logo" style="justify-content: center; font-size: 2.5rem;">
                <span class="eye-icon">👁️</span> SNAKE EYE
            </h1>
            <p style="color: var(--text-dim); margin-top: 0.5rem;">Vui lòng đăng nhập để tiếp tục</p>
        </div>

        <div class="glass-card">
            {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
            {% endif %}
            
            <form method="POST">
                <div class="form-group">
                    <label for="username">TÀI KHOẢN</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">MẬT KHẨU</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">SIGN IN 🛸</button>
            </form>
        </div>
        
        <p style="text-align: center; margin-top: 2rem; color: var(--text-dim); font-size: 0.8rem;">
            &copy; 2026 Snake Eye AI Systems. All rights reserved.
        </p>
    </div>
</body>
</html>
